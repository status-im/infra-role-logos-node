---
# Container
logos_node_cont_tag: 'latest'
logos_node_cont_image: 'harbor.status.im/logos-messaging/logos-node:{{ logos_node_cont_tag }}'
logos_node_cont_name: 'logos-node'
logos_node_cont_vol: '/docker/{{ logos_node_cont_name }}'
logos_node_conf_path: '{{ logos_node_cont_vol }}/conf'

# Logging
logos_node_log_level: 'DEBUG'

# DNS/Network
logos_node_host: '0.0.0.0'
logos_node_dns4_domain_name: '{{ ansible_hostname }}'
logos_node_public_address: '{{ ansible_host }}'

# Modules
logos_node_modules: ['waku_module']
logos_node_module_commands:
  - 'waku_module.initWaku(@/conf/waku_config.json)'
  - 'waku_module.startWaku()'

# Module flags
logos_node_delivery_enabled: '{{ "waku_module" in logos_node_modules }}'
logos_node_storage_enabled: '{{ "storage_module" in logos_node_modules }}'
logos_node_blockchain_enabled: '{{ "liblogos_blockchain_module" in logos_node_modules }}'

# --- Delivery module ---

# Node identity
#logos_node_delivery_key: ''
#logos_node_delivery_mix_key: ''

# Network
logos_node_cluster_id: 2
logos_node_num_shards_in_network: 8

# Protocols
logos_node_relay: true
logos_node_store: false
logos_node_filter: false
logos_node_lightpush: false
logos_node_mix: false
logos_node_discv5: false
logos_node_kad_discovery: false

# P2P
logos_node_p2p_max_connections: 150

# Ports
logos_node_p2p_tcp_port: 30303
logos_node_disc_v5_port: 9000
logos_node_websock_port: 8000

# Websocket
logos_node_websocket_enabled: false
logos_node_websocket_secure_enabled: false
logos_node_websocket_ssl_dir: '/etc/letsencrypt'

# Store - Postgres
logos_node_store_db_url: ''
logos_node_store_retention_policy: 'size:1GB'

# Kademlia bootstrap nodes
logos_node_kad_bootstrap_nodes: []

# --- Storage module ---

# Network
logos_node_storage_tcp_port: 8080
logos_node_storage_disc_port: 9090
logos_node_storage_nat: 'extip:{{ logos_node_public_address }}'
logos_node_storage_listen_addrs:
  - '/ip4/0.0.0.0/tcp/{{ logos_node_storage_tcp_port }}'
logos_node_storage_max_peers: 160

# API
logos_node_storage_api_port: 8091
logos_node_storage_api_bindaddr: '0.0.0.0'
logos_node_storage_api_cors_origin: '*'

# Metrics
logos_node_storage_metrics_enabled: true
logos_node_storage_metrics_address: '0.0.0.0'
logos_node_storage_metrics_port: 8008

# Storage
logos_node_storage_data_dir: '/data'
logos_node_storage_repo_kind: 'fs'
logos_node_storage_quota: 21474836480
logos_node_storage_block_ttl: '4w2d'
logos_node_storage_block_mi: '10m'
logos_node_storage_block_mn: 1000
logos_node_storage_block_retries: 3000
logos_node_storage_cache_size: 0

# Identity
#logos_node_storage_key: ''

# Bootstrap SPR
logos_node_storage_bootstrap_nodes: []

# Content preloading
logos_node_storage_content_dir: '{{ logos_node_cont_vol }}/content'

# --- Blockchain module ---

# Deployment
logos_node_blockchain_deployment: 'devnet'

# Ports
logos_node_blockchain_swarm_port: 3000
logos_node_blockchain_blend_port: 3400
logos_node_blockchain_api_port: 8080

# Network
logos_node_blockchain_peer_response_timeout: 30000

# Peers
logos_node_blockchain_initial_peers: []

# Storage
logos_node_blockchain_db_dir: './db'
logos_node_blockchain_state_dir: './state'

# Identity
#logos_node_blockchain_node_key: ''
#logos_node_blockchain_blend_signing_key: ''
#logos_node_blockchain_blend_zk_key: ''
#logos_node_blockchain_funding_pk: ''
#logos_node_blockchain_voucher_master_key: ''
#logos_node_blockchain_kms_keys: {}
#logos_node_blockchain_wallet_known_keys: {}

# OTEL collector
logos_otel_cont_name: 'logos-otel-collector'
logos_otel_version: '0.80.0'
logos_otel_cont_image: 'otel/opentelemetry-collector-contrib:{{ logos_otel_version }}'
logos_otel_exposed_port: 8888
logos_otel_exporter_port: 8889
logos_otel_rpc_receiver_port: 4317
logos_otel_http_receiver_port: 4318
logos_otel_healthcheck_port: 13133


# --- Resource limits ---
logos_node_cpu_limit: '{{ ansible_processor_cores - 0.3 }}'
logos_node_mem_limit: '{{ (ansible_memtotal_mb * 0.85) | int }}'

# --- Consul ---
logos_node_consul_service_name: 'logos-node'
logos_node_consul_check_interval: '60s'
logos_node_consul_check_timeout: '5s'
logos_node_consul_success_before_passing: 0
logos_node_consul_failures_before_warning: 1
logos_node_consul_failures_before_critical: 2

# --- Container monitor ---
logos_node_monitor_enabled: true
logos_node_monitor_meta_fields: ['image', 'commit', 'version']
logos_node_monitor_docker_events: ['stop', 'start', 'restart', 'die', 'kill']
logos_node_monitor_service_name: 'monitor-{{ logos_node_cont_name }}'
logos_node_monitor_service_user: 'root'
logos_node_monitor_service_work_dir: '/etc/consul'
logos_node_monitor_script: '{{ logos_node_cont_vol }}/monitor.sh'

# --- Compose ---
compose_recreate: 'auto'
compose_state: 'present'
compose_pull: 'always'
